name: Market Briefing SMS

on:
  schedule:
    - cron: "7 */8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate briefing without sending SMS"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: market-briefing-sms
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
      BRIEF_TO_PHONE: ${{ secrets.BRIEF_TO_PHONE }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_PHONE: ${{ secrets.TWILIO_FROM_PHONE }}
      TWILIO_MESSAGING_SERVICE_SID: ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
      HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
      BRIEFING_INTERVAL_HOURS: "8"
      BRIEFING_TIMEZONE: America/Los_Angeles
      BRIEFING_NEWS_FEEDS: "https://feeds.bbci.co.uk/news/business/rss.xml,https://finance.yahoo.com/news/rssindex,https://www.cnbc.com/id/100003114/device/rss/rss.html"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BRIEFING_DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          else
            echo "BRIEFING_DRY_RUN=false" >> "$GITHUB_ENV"
          fi

      - name: Use example holdings for dry-run without secrets
        run: |
          if [ -z "$HOLDINGS_JSON" ] && [ "$BRIEFING_DRY_RUN" = "true" ]; then
            echo "HOLDINGS_PATH=config/holdings.example.json" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate config
        run: |
          if [ "$BRIEFING_DRY_RUN" = "false" ]; then
            python -m qlab.briefing_service.main doctor --live
          else
            python -m qlab.briefing_service.main doctor --briefing
          fi

      - name: Build and send briefing
        run: python -m qlab.briefing_service.main once --send


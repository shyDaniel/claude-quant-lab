services:
  - type: worker
    runtime: docker
    name: quant-market-briefing
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python -m qlab.briefing_service.main scheduler
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: BRIEF_TO_PHONE
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: HOLDINGS_JSON
        sync: false
      - key: BRIEFING_INTERVAL_HOURS
        value: "8"
      - key: BRIEFING_TIMEZONE
        value: America/Los_Angeles
      - key: BRIEFING_DRY_RUN
        value: "true"
      - key: BRIEFING_SEND_ON_START
        value: "true"
